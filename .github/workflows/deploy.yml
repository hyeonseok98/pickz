name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api/**'
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api
    
    steps:
      - uses: actions/checkout@v3

      - name: Create application-prod.yml
        run: |
          mkdir -p src/main/resources
          echo "$YML_PROD" | base64 --decode > src/main/resources/application-prod.yml
        shell: bash
        env:
          YML_PROD: ${{ secrets.APPLICATION_PROD }}

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/pickz:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/pickz:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Copy docker-compose and script to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "api/docker-compose.yml,api/deploy.sh"
          target: "/home/ubuntu/"
          strip_components: 1
          
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/pickz" >> .env
            
            chmod +x ./deploy.sh
            ./deploy.sh
