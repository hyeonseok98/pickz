version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: pickz-db
    restart: always
    environment:
      MYSQL_DATABASE: pickz_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-blue:
    image: ${DOCKER_IMAGE}:latest
    container_name: blue
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://db:3306/pickz_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    networks:
      - backend-network
    depends_on:
      db:
        condition: service_healthy
          

  app-green:
    image: ${DOCKER_IMAGE}:latest
    container_name: green
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://db:3306/pickz_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=8081
    ports:
      - "8081:8081"
    networks:
      - backend-network
    depends_on:
      db:
        condition: service_healthy

networks:
  backend-network:
    driver: bridge
